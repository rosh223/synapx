services:
  - type: web
    name: synpax
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --worker-class uvicorn.workers.UvicornWorker --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: NVIDIA_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.12.0
